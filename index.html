    // --- Audio System (Synthesized) ---
    const playSound = (type) => {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;
      const ctx = new AudioContext();
      const osc = ctx.createOscillator();
      const gainNode = ctx.createGain();
      
      osc.connect(gainNode);
      gainNode.connect(ctx.destination);

      if (type === 'bell') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.1);
        gainNode.gain.setValueAtTime(0.5, ctx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
        osc.start();
        osc.stop(ctx.currentTime + 0.5);
      } else if (type === 'buzzer') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, ctx.currentTime);
        gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
        osc.start();
        osc.stop(ctx.currentTime + 0.3);
      }
    };

    const TOTAL_CHALLENGES = 10;
    const CHALLENGES = Array.from({ length: TOTAL_CHALLENGES }, (_, i) => ({
      id: i + 1,
      title: `Week ${Math.floor(i / 2) + 1} - Part ${i % 2 === 0 ? 'A' : 'B'}`,
      description: `Challenge ${i + 1}: Master 20 new words.`,
      words: ALL_WORDS.filter(w => w.challenge === i + 1)
    }));

    const shuffle = (array) => {
      let currentIndex = array.length, randomIndex;
      while (currentIndex !== 0) {
        randomIndex = Math.floor(Math.random() * currentIndex);
        currentIndex--;
        [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
      }
      return array;
    };

    // --- Global State ---
    let currentView = 'dashboard';
    let activeChallengeId = null;
    let userData = { knownWords: [], scores: {} };
    
    // View States
    let studyState = { words: [], index: 0, known: [], unknown: [], flipped: false };
    let actAState = { questions: [], currentQ: 0, mistakes: 0, selectedAnswer: null };
    let actBState = { batches: [], currentBatchIndex: 0, wordsCol: [], defsCol: [], selectedWord: null, selectedDef: null, matchedIds: [], mistakes: 0 };
    
    const appMain = document.getElementById('app-main');
    const navHomeBtn = document.getElementById('nav-home-btn');

    // --- Navigation & Flow ---
    function goHome() {
      currentView = 'dashboard';
      navHomeBtn.classList.add('hidden');
      renderDashboard();
    }

    function startChallenge(id) {
      activeChallengeId = id;
      currentView = 'study';
      navHomeBtn.classList.remove('hidden');
      
      // Initialize Study State
      const challengeWords = CHALLENGES.find(c => c.id === id).words || [];
      if (challengeWords.length === 0) {
        alert("Words for this challenge are not yet populated.");
        goHome();
        return;
      }
      
      studyState = { words: challengeWords, index: 0, known: [], unknown: [], flipped: false };
      renderStudyMode();
    }

    function saveProgress(newData) {
      if (newData.knownWords !== undefined) userData.knownWords = newData.knownWords;
      if (newData.scores !== undefined) userData.scores = { ...userData.scores, ...newData.scores };
    }

    // --- Renderers ---

    // 1. Dashboard
    function renderDashboard() {
      let challengesHTML = CHALLENGES.map(challenge => {
        const score = userData.scores[challenge.id];
        const isCompleted = score !== undefined;
        
        return `
          <div 
            class="relative rounded-2xl p-6 border-2 transition-all bg-white border-slate-200 hover:border-blue-400 hover:shadow-md cursor-pointer"
            onclick="startChallenge(${challenge.id})"
          >
            <div class="flex justify-between items-start mb-4">
              <div>
                <h3 class="text-xl font-bold text-slate-800">${challenge.title}</h3>
                <p class="text-sm text-slate-500 font-medium">${challenge.description}</p>
              </div>
              ${isCompleted ? `
                <div class="flex items-center gap-1 bg-green-100 text-green-700 px-3 py-1 rounded-full text-sm font-bold">
                  <i class="ph-fill ph-trophy"></i>
                  ${score}%
                </div>
              ` : ''}
            </div>
            <div class="mt-6 flex justify-end">
              <button class="flex items-center gap-2 text-blue-600 font-bold hover:text-blue-700">
                ${isCompleted ? 'Review Challenge' : 'Start Challenge'} <i class="ph-bold ph-arrow-right"></i>
              </button>
            </div>
          </div>
        `;
      }).join('');

      appMain.innerHTML = `
        <div class="space-y-8 animate-fade-in">
          <div class="bg-white rounded-2xl p-8 shadow-sm border border-slate-200">
            <h2 class="text-3xl font-bold text-slate-800 mb-2">Welcome Back!</h2>
            <p class="text-slate-600 text-lg">
              You've mastered <span class="font-bold text-blue-600">${userData.knownWords.length}</span> words so far. Keep going!
            </p>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-6">
            ${challengesHTML}
          </div>
        </div>
      `;
    }

    // 2. Study Mode
    function renderStudyMode() {
      const wordObj = studyState.words[studyState.index];
      
      appMain.innerHTML = `
        <div class="flex flex-col items-center justify-center min-h-[60vh] animate-fade-in">
          <div class="w-full flex justify-between text-sm font-bold text-slate-500 mb-6 px-4">
            <span>Study Mode</span>
            <span>Word ${studyState.index + 1} of ${studyState.words.length}</span>
          </div>

          <!-- Flashcard -->
          <div 
            class="w-full max-w-lg aspect-[4/3] perspective-1000 mb-8 cursor-pointer"
            onclick="flipStudyCard()"
          >
            <div id="study-card-inner" class="relative w-full h-full transition-transform duration-500 transform-style-3d ${studyState.flipped ? 'rotate-y-180' : ''}">
              
              <!-- Front -->
              <div class="absolute w-full h-full backface-hidden bg-white border-2 border-slate-200 rounded-3xl shadow-sm flex flex-col items-center justify-center p-8">
                <h2 class="text-5xl font-black text-slate-800 tracking-tight">${wordObj.word}</h2>
                <p class="mt-8 text-slate-400 font-medium flex items-center gap-2">
                  <i class="ph-bold ph-arrow-counter-clockwise"></i> Tap to reveal definition
                </p>
              </div>

              <!-- Back -->
              <div class="absolute w-full h-full backface-hidden bg-blue-50 border-2 border-blue-200 rounded-3xl shadow-sm flex flex-col items-center justify-center p-8 rotate-y-180 text-center">
                <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider mb-4">
                  ${wordObj.pos}
                </span>
                <p class="text-2xl font-medium text-slate-800 leading-snug">${wordObj.def}</p>
              </div>

            </div>
          </div>

          <!-- Controls -->
          <div id="study-controls" class="flex gap-4 transition-opacity duration-300 w-full max-w-lg ${studyState.flipped ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'}">
            <button 
              onclick="handleStudyNext('unknown')"
              class="flex-1 bg-white border-2 border-orange-200 text-orange-600 hover:bg-orange-50 font-bold py-4 rounded-xl flex items-center justify-center gap-2 shadow-sm"
            >
              <i class="ph-bold ph-x text-xl"></i> This is new for me
            </button>
            <button 
              onclick="handleStudyNext('known')"
              class="flex-1 bg-blue-600 text-white hover:bg-blue-700 font-bold py-4 rounded-xl flex items-center justify-center gap-2 shadow-sm"
            >
              <i class="ph-bold ph-check text-xl"></i> I know this already
            </button>
          </div>
        </div>
      `;
    }

    window.flipStudyCard = function() {
      if (!studyState.flipped) {
        studyState.flipped = true;
        document.getElementById('study-card-inner').classList.add('rotate-y-180');
        document.getElementById('study-controls').classList.remove('opacity-0', 'pointer-events-none');
        document.getElementById('study-controls').classList.add('opacity-100', 'pointer-events-auto');
      }
    };

    window.handleStudyNext = function(status) {
      const wordId = studyState.words[studyState.index].id;
      if (status === 'known') studyState.known.push(wordId);
      else studyState.unknown.push(wordId);

      if (studyState.index < studyState.words.length - 1) {
        studyState.index++;
        studyState.flipped = false;
        renderStudyMode();
      } else {
        // Complete Study Mode
        const updatedKnown = [...new Set([...userData.knownWords, ...studyState.known])];
        const finalKnown = updatedKnown.filter(wId => !studyState.unknown.includes(wId));
        saveProgress({ knownWords: finalKnown });

        if (studyState.unknown.length === 0) {
          // Knew everything!
          saveProgress({ scores: { [activeChallengeId]: 100 } });
          currentView = 'results';
          renderResults();
        } else {
          initActivityA();
        }
      }
    };

    // 3. Activity A
    function initActivityA() {
      const challengeWords = CHALLENGES.find(c => c.id === activeChallengeId).words;
      const unknownWordsList = challengeWords.filter(w => !userData.knownWords.includes(w.id));
      
      const qs = unknownWordsList.map(targetWord => {
        let distractors = shuffle(challengeWords.filter(w => w.id !== targetWord.id)).slice(0, 3);
        let options = shuffle([targetWord, ...distractors]);
        return { word: targetWord, sentence: targetWord.sentence, options: options };
      });
      
      actAState = { questions: shuffle(qs), currentQ: 0, mistakes: 0, selectedAnswer: null };
      currentView = 'activity_a';
      renderActivityA();
    }

    function renderActivityA() {
      const q = actAState.questions[actAState.currentQ];
      const blankedSentence = q.sentence.replace('_____', '________');

      const optionsHTML = q.options.map(opt => {
        let btnStyle = "bg-white border-2 border-slate-200 hover:border-blue-400 hover:bg-blue-50 text-slate-700";
        
        if (actAState.selectedAnswer === opt.id) {
          if (opt.id === q.word.id) btnStyle = "bg-green-100 border-2 border-green-500 text-green-800 shadow-inner";
          else btnStyle = "bg-red-100 border-2 border-red-500 text-red-800 shadow-inner";
        } else if (actAState.selectedAnswer && opt.id === q.word.id) {
          btnStyle = "bg-green-50 border-2 border-green-400 text-green-700 opacity-80";
        } else if (actAState.selectedAnswer) {
          btnStyle = "bg-white border-2 border-slate-100 text-slate-400 opacity-50";
        }

        return `
          <button
            onclick="handleAnswerA(${opt.id})"
            ${actAState.selectedAnswer ? 'disabled' : ''}
            class="p-5 rounded-xl font-bold text-lg transition-all duration-200 ${btnStyle}"
          >
            ${opt.word}
          </button>
        `;
      }).join('');

      let feedbackHTML = '';
      if (actAState.selectedAnswer) {
        const isCorrect = actAState.selectedAnswer === q.word.id;
        feedbackHTML = `
          <div class="mt-8 text-center text-xl font-bold animate-bounce ${isCorrect ? 'text-green-600' : 'text-red-500'}">
            ${isCorrect ? 'Correct!' : 'Oops, that was wrong.'}
          </div>
        `;
      }

      appMain.innerHTML = `
        <div class="max-w-2xl mx-auto py-8 animate-fade-in">
          <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold text-slate-800">Activity A: Fill in the Blank</h2>
            <div class="text-sm font-bold text-slate-500 bg-white px-3 py-1 rounded-full border border-slate-200 shadow-sm">
              ${actAState.currentQ + 1} / ${actAState.questions.length}
            </div>
          </div>

          <div class="bg-white rounded-2xl p-8 shadow-sm border border-slate-200 mb-8 min-h-[160px] flex items-center justify-center text-center">
            <p class="text-2xl font-medium text-slate-700 leading-relaxed">
              ${blankedSentence}
            </p>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            ${optionsHTML}
          </div>
          ${feedbackHTML}
        </div>
      `;
    }

    window.handleAnswerA = function(optionId) {
      if (actAState.selectedAnswer) return;
      actAState.selectedAnswer = optionId;
      
      const q = actAState.questions[actAState.currentQ];
      const isCorrect = optionId === q.word.id;
      
      if (isCorrect) playSound('bell');
      else { playSound('buzzer'); actAState.mistakes++; }

      renderActivityA(); // Update UI to show colors

      setTimeout(() => {
        actAState.selectedAnswer = null;
        if (actAState.currentQ < actAState.questions.length - 1) {
          actAState.currentQ++;
          renderActivityA();
        } else {
          initActivityB();
        }
      }, 1500);
    };

    // 4. Activity B
    function initActivityB() {
      const challengeWords = CHALLENGES.find(c => c.id === activeChallengeId).words;
      const unknownWordsList = challengeWords.filter(w => !userData.knownWords.includes(w.id));
      
      let shuffled = shuffle([...unknownWordsList]);
      let newBatches = [];
      for (let i = 0; i < shuffled.length; i += 5) {
        newBatches.push(shuffled.slice(i, i + 5));
      }
      
      actBState = { batches: newBatches, currentBatchIndex: 0, mistakes: actAState.mistakes };
      loadBatchB();
      
      currentView = 'activity_b';
      renderActivityB();
    }

    function loadBatchB() {
      const currentBatch = actBState.batches[actBState.currentBatchIndex];
      actBState.wordsCol = shuffle([...currentBatch]);
      actBState.defsCol = shuffle([...currentBatch]);
      actBState.selectedWord = null;
      actBState.selectedDef = null;
      actBState.matchedIds = [];
    }

    function renderActivityB() {
      const wordsHTML = actBState.wordsCol.map(item => {
        const isMatched = actBState.matchedIds.includes(item.id);
        const isSelected = actBState.selectedWord === item.id;
        const isErrorState = isSelected && actBState.selectedDef && actBState.selectedWord !== actBState.selectedDef;

        let baseClass = "p-4 rounded-xl border-2 text-center font-bold text-lg cursor-pointer transition-all duration-200 select-none ";
        if (isMatched) baseClass += "bg-slate-100 border-slate-200 text-slate-300 opacity-50 pointer-events-none";
        else if (isErrorState) baseClass += "bg-red-100 border-red-500 text-red-700 animate-shake";
        else if (isSelected) baseClass += "bg-blue-100 border-blue-500 text-blue-800 shadow-inner";
        else baseClass += "bg-white border-slate-200 text-slate-700 hover:border-blue-300 hover:shadow-md";

        return `
          <div 
            id="word-${item.id}"
            class="${baseClass}"
            onclick="!${isMatched} && !${isErrorState} && handleSelectB('word', ${item.id})"
          >
            ${item.word}
          </div>
        `;
      }).join('');

      const defsHTML = actBState.defsCol.map(item => {
        const isMatched = actBState.matchedIds.includes(item.id);
        const isSelected = actBState.selectedDef === item.id;
        const isErrorState = isSelected && actBState.selectedWord && actBState.selectedDef !== actBState.selectedWord;

        let baseClass = "p-4 rounded-xl border-2 font-medium text-sm md:text-base cursor-pointer transition-all duration-200 select-none flex items-center min-h-[64px] ";
        if (isMatched) baseClass += "bg-slate-100 border-slate-200 text-slate-300 opacity-50 pointer-events-none";
        else if (isErrorState) baseClass += "bg-red-100 border-red-500 text-red-700 animate-shake";
        else if (isSelected) baseClass += "bg-blue-100 border-blue-500 text-blue-800 shadow-inner";
        else baseClass += "bg-white border-slate-200 text-slate-700 hover:border-blue-300 hover:shadow-md";

        return `
          <div 
            id="def-${item.id}"
            class="${baseClass}"
            onclick="!${isMatched} && !${isErrorState} && handleSelectB('def', ${item.id})"
          >
            ${item.def}
          </div>
        `;
      }).join('');

      appMain.innerHTML = `
        <div class="max-w-4xl mx-auto py-8 animate-fade-in">
          <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold text-slate-800">Activity B: Match to Definition</h2>
            <div class="text-sm font-bold text-slate-500 bg-white px-3 py-1 rounded-full border border-slate-200 shadow-sm">
              Batch ${actBState.currentBatchIndex + 1} / ${actBState.batches.length}
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="flex flex-col gap-3">${wordsHTML}</div>
            <div class="flex flex-col gap-3">${defsHTML}</div>
          </div>
        </div>
      `;
    }

    window.handleSelectB = function(type, id) {
      if (type === 'word') actBState.selectedWord = actBState.selectedWord === id ? null : id;
      else actBState.selectedDef = actBState.selectedDef === id ? null : id;

      renderActivityB();

      if (actBState.selectedWord && actBState.selectedDef) {
        if (actBState.selectedWord === actBState.selectedDef) {
          // Correct Match
          playSound('bell');
          actBState.matchedIds.push(actBState.selectedWord);
          actBState.selectedWord = null;
          actBState.selectedDef = null;
          renderActivityB();

          if (actBState.matchedIds.length === actBState.wordsCol.length) {
            setTimeout(() => {
              if (actBState.currentBatchIndex < actBState.batches.length - 1) {
                actBState.currentBatchIndex++;
                loadBatchB();
                renderActivityB();
              } else {
                // Finish Challenge
                const totalTested = CHALLENGES.find(c => c.id === activeChallengeId).words.filter(w => !userData.knownWords.includes(w.id)).length;
                const maxPossible = totalTested * 2;
                let penalty = (actBState.mistakes * 100) / maxPossible;
                let finalScore = Math.max(0, Math.round(100 - penalty));
                
                const prevBest = userData.scores[activeChallengeId] || 0;
                saveProgress({ scores: { [activeChallengeId]: Math.max(prevBest, finalScore) } });
                
                currentView = 'results';
                renderResults();
              }
            }, 1000);
          }
        } else {
          // Incorrect Match
          playSound('buzzer');
          actBState.mistakes++;
          
          setTimeout(() => {
            actBState.selectedWord = null;
            actBState.selectedDef = null;
            renderActivityB();
          }, 800);
        }
      }
    };

    // 5. Results
    function renderResults() {
      const score = userData.scores[activeChallengeId];
      
      if (score > 80) {
        playSound('bell');
        setTimeout(() => playSound('bell'), 200);
        setTimeout(() => playSound('bell'), 400);
      }

      let message = "Good effort!";
      if (score >= 90) message = "Incredible Job!";
      else if (score >= 70) message = "Great Work!";

      appMain.innerHTML = `
        <div class="min-h-[60vh] flex flex-col items-center justify-center animate-fade-in text-center px-4">
          <div class="bg-white rounded-3xl p-10 md:p-16 shadow-lg border border-slate-200 w-full max-w-lg">
            <div class="w-24 h-24 mx-auto bg-blue-100 rounded-full flex items-center justify-center mb-6">
              <i class="ph-fill ph-trophy text-blue-600 text-5xl"></i>
            </div>
            
            <h2 class="text-3xl font-black text-slate-800 mb-2">${message}</h2>
            <p class="text-slate-500 font-medium mb-8">You've completed Challenge ${activeChallengeId}.</p>
            
            <div class="mb-10">
              <div class="text-7xl font-black text-blue-600 mb-2">${score}%</div>
              <div class="text-sm font-bold text-slate-400 uppercase tracking-widest">Accuracy Score</div>
            </div>

            <button 
              onclick="goHome()"
              class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 transition-colors"
            >
              <i class="ph-bold ph-house text-xl"></i> Return to Dashboard
            </button>
          </div>
        </div>
      `;
    }

    // Initialize App
    renderDashboard();

  </script>
</body>
</html>
